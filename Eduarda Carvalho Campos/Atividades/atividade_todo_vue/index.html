<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarefas</title>

    <!-- Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
      body {
        font-family: "Gill Sans", sans-serif;
        background: #cdcdcd;
        padding: 16px;
      }

      h1 {
        color: rgb(2, 93, 96);
        text-align: center;
      }

      .input-area {
        text-align: center;
        margin-bottom: 20px;
      }

      .input-area input {
        padding: 8px;
        width: 160px;
        border-radius: 8px;
        border: 1px solid #aaa;
        outline: none;
      }

      .btn-adicionar {
        padding: 8px 12px;
        margin-left: 5px;
        color: white;
        background-color: brown;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.5s;
      }

      .btn-adicionar:hover {
        color: rgb(184, 183, 183);
        background-color: rgb(99, 21, 21);
      }

      ul {
        padding: 0px;
        list-style: none;
        max-width: 600px;
        margin: 0 auto;
      }

      li {
        background: #fff;
        margin: 16px 16px;
        padding: 10px;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
      }

      .fechar {
        background-color: darkred;
        border-radius: 100px;
        color: white;
        border: none;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .fechar:hover {
        background-color: rgb(139, 0, 0);
      }

      li.concluida {
        text-decoration: line-through;
        color: gray;
      }

      .tarefa-texto {
        flex: 1;
        user-select: none;
      }

      .lista-vazia {
        text-align: center;
        color: #666;
        font-style: italic;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>

    <!-- Ponto de montagem do app Vue -->
    <div id="app">

      <h1>Tarefas</h1>

      <!-- Área de entrada de nova tarefa -->
      <div class="input-area">
        <input
          type="text"
          v-model="novaTarefa"
          placeholder="Digite sua Tarefa!"
          @keyup.enter="adicionarTarefa"
        />
        <button class="btn-adicionar" @click="adicionarTarefa">+</button>
      </div>

      <!-- Lista de tarefas renderizada com v-for -->
      <ul>
        <li
          v-for="tarefa in tarefas"
          :key="tarefa.id"
          :class="{ concluida: tarefa.concluida }"
          @click="marcarConcluida(tarefa)"
        >
          <span class="tarefa-texto">{{ tarefa.texto }}</span>
          <button
            class="fechar"
            @click.stop="removerTarefa(tarefa.id)"
          >x</button>
        </li>
      </ul>

      <!-- Mensagem quando a lista está vazia -->
      <p v-if="tarefas.length === 0" class="lista-vazia">
        Nenhuma tarefa adicionada ainda.
      </p>

    </div>

    <script src="app.js"></script>

  </body>
</html>
